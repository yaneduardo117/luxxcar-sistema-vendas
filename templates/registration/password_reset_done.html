{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="bg-luxx_card p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-800 text-center">

        <div class="w-16 h-16 bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-luxx_accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
        </div>

        <h2 class="text-3xl font-bold text-white mb-4">Verifique seu E-mail</h2>
        <p class="text-gray-400 text-sm mb-8">Nós enviamos as instruções para criar uma nova senha. Por favor, verifique sua caixa de entrada e também a pasta de spam.</p>

        <a href="{% url 'login' %}" class="inline-block w-full px-6 py-3 rounded-lg border border-gray-700 text-gray-300 hover:bg-gray-800 transition">
            Voltar para o Login
        </a>
    </div>
</div>
{% endblock %}
