{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="bg-luxx_card p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-800 text-center">

        <div class="w-16 h-16 bg-green-900 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>

        <h2 class="text-3xl font-bold text-white mb-4">Senha Alterada!</h2>
        <p class="text-gray-400 text-sm mb-8">Sua senha foi atualizada com sucesso. Você já pode acessar o sistema com sua nova credencial.</p>

        <a href="{% url 'login' %}" class="inline-block w-full bg-luxx_accent text-black font-bold py-3 px-4 rounded-lg hover:bg-yellow-500 transition duration-200">
            Ir para o Login
        </a>
    </div>
</div>
{% endblock %}
